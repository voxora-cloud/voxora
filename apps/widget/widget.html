<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxora AI</title>
    <link rel="stylesheet" href="/src/iframe/styles/main.css" />
  </head>
  <body class="dark-theme">
    <div id="app" class="widget-app">

      <div class="widget-topbar">
        <div class="widget-topbar-title">Support Chat</div>
        <div class="topbar-actions">
          <button id="historyBtn" class="topbar-action-btn" title="Conversation History">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
          <button id="vx-maximize" class="topbar-action-btn" title="Maximize">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"></polyline>
              <polyline points="9 21 3 21 3 15"></polyline>
              <line x1="21" y1="3" x2="14" y2="10"></line>
              <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
          </button>
          <button id="vx-minimize" class="topbar-action-btn" title="Minimize">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- History Overlay -->
      <div id="historyOverlay" class="history-overlay">
        <div class="history-header">
          <div>
            <h3>Conversation History</h3>
            <p>Jump back into previous chats</p>
          </div>
          <button id="closeHistoryBtn" class="close-history-btn" title="Close history"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="historyList" class="history-list"></div>
      </div>
      <!-- Messages Area (Hidden initially or if no messages) -->
      <div id="messagesContainer" class="messages-container" style="display: none;"></div>

      <!-- Welcome & Suggestions (Shown initially) -->
      <div id="welcomeScreen" class="welcome-container">
        <div class="assistant-header">
          <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
              <!-- A simple sparkle/AI icon -->
              <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
          </div>
          <h2>How can I help you today?</h2>
        </div>

        <div id="suggestions" class="suggestions-grid">
          <button class="suggestion-btn" data-text="Summarize this page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
            <span>Summarize this page</span>
          </button>
          <button class="suggestion-btn" data-text="Translate this page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
            <span>Translate this page</span>
          </button>
          <button class="suggestion-btn" data-text="Analyze for insights">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span>Analyze for insights</span>
          </button>
          <button class="suggestion-btn" data-text="Create a task tracker">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <span>Create a task tracker</span>
          </button>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <textarea id="messageInput" placeholder="Do anything with AI..." rows="1"></textarea>
        <!-- The attach button is hidden via layout, but kept for JS compatibility if needed -->
        <button id="attachBtn" class="hidden-btn" style="display:none;"></button>
        <input type="file" id="fileInput" style="display:none;" />
        
        <button id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      
      <!-- Kept for JS errors -->
      <div id="typingIndicator" style="display: none;"></div>
    </div>
    <script type="module" src="/src/iframe/main.ts"></script>
  </body>
</html>
